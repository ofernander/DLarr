<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>DLarr</title>
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="icon" href="/assets/icons/favicon.png" type="image/png" />
</head>
<body>
  <header id="top-nav" class="top-nav">
    <div class="top-nav-inner">
      <a href="#/dashboard" class="brand">
        <img class="brand-mark" src="/assets/icons/icon.png" alt="" />
        <span class="brand-name">DLarr</span>
      </a>
      <nav class="nav-items" aria-label="Primary">
        <a href="#/dashboard" data-route="dashboard">Dashboard</a>
        <a href="#/watches"   data-route="watches">Watches</a>
        <a href="#/arrs"      data-route="arrs">Arrs</a>
        <a href="#/settings"  data-route="settings">Settings</a>
        <a href="#/logs"      data-route="logs">Logs</a>
      </nav>
      <div class="nav-status" id="nav-status" title="Sync status">
        <span class="status-dot" id="sync-dot" data-status="unknown"></span>
        <span class="status-label" id="sync-label">connecting…</span>
      </div>
      <button class="nav-burger" id="nav-burger" aria-label="Toggle menu">☰</button>
    </div>
  </header>

  <main id="app" class="app-main" aria-live="polite">
    <section class="loading" id="initial-loading">
      <div class="spinner"></div>
      <p>Loading…</p>
    </section>
  </main>

  <footer class="app-footer" id="app-footer" aria-label="Version"></footer>

  <div id="toast-host" class="toast-host" aria-live="polite"></div>
  <div id="modal-host" class="modal-host" aria-hidden="true"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
